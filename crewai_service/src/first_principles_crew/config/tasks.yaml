# First Principles Thinking Tasks

anchor_task:
  description: >
    Help the user clearly define their core problem or question.
    Start by asking clarifying questions to understand what they're really trying to solve.
    Then help them articulate the problem in its most essential form.
    Your output should be a clear, concise problem statement that captures
    the fundamental issue.
  expected_output: >
    A clear problem statement that captures the core issue, along with
    2-3 key questions that will guide the next phase of thinking.
  agent: anchor_agent
  context: []
  output_json: true
  output_pydantic: "ProblemStatement"

assumption_challenge_task:
  description: >
    Take the problem statement and identify all assumptions being made.
    Categorize assumptions into: factual assumptions, value assumptions,
    and hidden assumptions. Question each assumption systematically.
    Ask: "What if this assumption is wrong?" for each one.
  expected_output: >
    A list of identified assumptions with categories, and for each assumption:
    1. The assumption itself
    2. Why it might be questionable
    3. Alternative possibilities if the assumption is false
  agent: assumption_challenger
  context:
    - anchor_task
  output_json: true
  output_pydantic: "AssumptionAnalysis"

root_cause_analysis_task:
  description: >
    Using the problem statement and challenged assumptions, dig deep to
    find the root causes. Use the "5 Whys" technique: ask "why" repeatedly
    until you reach fundamental causes. Distinguish between symptoms and
    actual causes. Identify the first principles at play.
  expected_output: >
    A root cause analysis including:
    1. The 5 Whys chain
    2. Identified root causes
    3. First principles discovered
    4. Systems-level insights
  agent: root_cause_analyst
  context:
    - anchor_task
    - assumption_challenge_task
  output_json: true
  output_pydantic: "RootCauseAnalysis"

solution_design_task:
  description: >
    Starting from the identified first principles and root causes,
    design a solution from the ground up. Question all requirements.
    Delete unnecessary parts. Optimize what remains. Consider multiple
    approaches and evaluate them against first principles.
  expected_output: >
    A first principles solution design including:
    1. Core requirements derived from first principles
    2. Multiple solution approaches
    3. Evaluation of each approach
    4. Recommended solution with justification
  agent: solution_architect
  context:
    - anchor_task
    - assumption_challenge_task
    - root_cause_analysis_task
  output_json: true
  output_pydantic: "SolutionDesign"

mindmap_creation_task:
  description: >
    Create a comprehensive mind map that visualizes the entire thinking
    process. Include: the original problem, assumptions challenged,
    root causes identified, first principles discovered, and solution
    designed. Make it visually clear and insightful.
  expected_output: >
    A detailed mind map in Mermaid.js syntax that can be rendered visually.
    The mind map should show connections between all elements of the
    thinking process.
  agent: mindmap_creator
  context:
    - anchor_task
    - assumption_challenge_task
    - root_cause_analysis_task
    - solution_design_task
  output_file: "output/mindmap.md"