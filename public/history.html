<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History — First Principles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#0A0A0B;color:#E8E6DF;min-height:100vh;}
  /* NAV - 统一导航栏样式 */
  nav{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:0.5px solid rgba(255,255,255,0.08);background:rgba(10,10,11,0.95);backdrop-filter:blur(12px);z-index:100;height:56px;}
  .nav-left{display:flex;align-items:center;gap:32px;}
  .logo{font-family:'Lora',serif;font-size:18px;color:#F0EDE4;text-decoration:none;flex-shrink:0;}
  .logo span{color:#B8A98A;font-style:italic;}
  .nav-links{display:flex;gap:32px;list-style:none;align-items:center;}
  .nav-links a{text-decoration:none;color:rgba(232,230,223,0.5);font-size:13px;font-weight:400;letter-spacing:0.02em;transition:color 0.2s;cursor:pointer;}
  .nav-links a:hover{color:#E8E6DF;}
  .nav-right{display:flex;align-items:center;gap:16px;margin-left:auto;}
  /* 用户菜单 */
  .user-menu{display:flex;align-items:center;gap:16px;}
  .user-info{display:flex;align-items:center;gap:10px;}
  .user-avatar{width:32px;height:32px;border-radius:50%;background:rgba(184,169,138,0.1);border:0.5px solid rgba(184,169,138,0.3);display:flex;align-items:center;justify-content:center;color:#B8A98A;font-size:12px;}
  .user-name{font-size:13px;color:rgba(232,230,223,0.7);}
  .user-credits{font-size:11px;color:#B8A98A;background:rgba(184,169,138,0.1);padding:4px 10px;border-radius:12px;}
  .auth-btn{background:rgba(184,169,138,0.1);border:0.5px solid rgba(184,169,138,0.3);color:#B8A98A;padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;transition:all 0.2s;}
  .auth-btn:hover{background:rgba(184,169,138,0.2);border-color:rgba(184,169,138,0.5);}
  /* 认证弹窗 */
  .auth-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,10,11,0.95);backdrop-filter:blur(12px);z-index:1000;display:none;align-items:center;justify-content:center;}
  .auth-modal.active{display:flex;}
  .auth-modal-content{background:rgba(255,255,255,0.03);border:0.5px solid rgba(255,255,255,0.1);border-radius:24px;padding:48px 40px;max-width:440px;width:90%;position:relative;}
  .auth-modal-close{position:absolute;top:20px;right:20px;background:none;border:none;color:rgba(232,230,223,0.5);font-size:28px;cursor:pointer;width:32px;height:32px;border-radius:50%;}
  .auth-modal-close:hover{color:#E8E6DF;background:rgba(255,255,255,0.05);}
  .auth-logo{text-align:center;margin-bottom:32px;}
  .auth-logo h2{font-family:'Lora',serif;font-size:28px;color:#F0EDE4;margin-bottom:8px;}
  .auth-logo p{font-size:14px;color:rgba(232,230,223,0.5);}
  .auth-btn-full{width:100%;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;}
  .google-btn{background:#fff;color:#0A0A0B;}
  .google-btn:hover{background:rgba(255,255,255,0.9);}
  .container{max-width:640px;margin:0 auto;padding:60px 24px;}
  .title{font-family:'Lora',serif;font-size:28px;color:#F0EDE4;margin-bottom:8px;letter-spacing:-0.5px;}
  .subtitle{font-size:14px;color:rgba(232,230,223,0.35);margin-bottom:32px;}
  .conv-list{display:flex;flex-direction:column;gap:6px;}
  .conv-item{display:block;background:rgba(255,255,255,0.02);border:0.5px solid rgba(255,255,255,0.06);border-radius:12px;padding:18px 20px;transition:all 0.2s;cursor:pointer;text-decoration:none;}
  .conv-item:hover{background:rgba(184,169,138,0.04);border-color:rgba(184,169,138,0.15);}
  .conv-item h3{font-size:14px;font-weight:500;color:rgba(232,230,223,0.8);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .conv-item .meta{font-size:12px;color:rgba(232,230,223,0.25);}
  .empty{text-align:center;padding:80px 20px;color:rgba(232,230,223,0.25);}
  .empty p{margin-bottom:12px;font-size:14px;}
  .empty a{color:#B8A98A;font-size:14px;text-decoration:none;}
</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <a href="/" class="logo">First <span>Principles</span></a>
    <ul class="nav-links">
      <li><a href="/about">How it works</a></li>
      <li><a href="/pricing">Pricing</a></li>
    </ul>
  </div>
  <div class="nav-right">
    <div id="userMenu" class="user-menu" style="display: none;">
      <div class="user-info">
        <div class="user-credits" id="userCredits">0 积分</div>
        <div class="user-name" id="userName"></div>
        <div class="user-avatar" id="userAvatar">U</div>
      </div>
    </div>
    <div id="authButtonContainer">
      <button class="auth-btn" onclick="openAuthModal()">登录</button>
    </div>
  </div>
</nav>

<!-- 认证模态框 -->
<div id="authModal" class="auth-modal">
  <div class="auth-modal-content">
    <button class="auth-modal-close" onclick="closeAuthModal()">&times;</button>
    
    <div class="auth-logo">
      <span style="font-size: 48px;">🧠</span>
      <h2>First Principles</h2>
      <p>登录以保存您的思考会话</p>
    </div>

    <div class="auth-buttons">
      <button class="auth-btn-full google-btn" onclick="signInWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path d="M17.64 9.2c0-.637-.057-1.252-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.715H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.277C4.672 5.146 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        使用 Google 继续
      </button>
    </div>

    <div style="text-align: center; margin-top: 24px;">
      <p style="font-size: 12px; color: rgba(232, 230, 223, 0.4);">
        首次登录将自动创建账户
      </p>
    </div>
  </div>
</div>

<!-- 认证相关脚本 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/auth.js"></script>
<script>
function openAuthModal() {
  document.getElementById('authModal').classList.add('active');
}
function closeAuthModal() {
  document.getElementById('authModal').classList.remove('active');
}
window.onclick = function(event) {
  const modal = document.getElementById('authModal');
  if (event.target === modal) {
    closeAuthModal();
  }
}
window.openAuthModal = openAuthModal;
window.closeAuthModal = closeAuthModal;
</script>
<div class="container">
  <h1 class="title">History</h1>
  <p class="subtitle">Your past thinking sessions.</p>
  <div class="conv-list" id="conv-list"><div style="color:rgba(232,230,223,0.2);font-size:12px;">Loading...</div></div>
</div>
<script>
async function load(){
  const list=document.getElementById('conv-list');
  try{
    const r=await fetch('/api/conversations');const c=await r.json();
    if(!c.length){list.innerHTML='<div class="empty"><p>🧠</p><p>No sessions yet.</p><a href="/chat/new">Start your first session →</a></div>';return;}
    list.innerHTML=c.map(x=>`<a href="/chat/${x.id}" class="conv-item"><h3>${esc(x.title)}</h3><div class="meta">${x.msg_count} messages · ${fmtDate(x.updated_at)}</div></a>`).join('');
  }catch{list.innerHTML='<div class="empty"><p>Failed to load.</p></div>';}
}
function fmtDate(iso){if(!iso)return '';const d=new Date(iso+(iso.includes('Z')||iso.includes('+')?'':'Z'));return d.toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
load();
</script>
</body>
</html>
