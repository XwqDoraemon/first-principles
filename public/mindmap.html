<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind Map — First Principles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#0A0A0B;color:#E8E6DF;min-height:100vh;}
  nav{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:0.5px solid rgba(255,255,255,0.08);background:rgba(10,10,11,0.95);backdrop-filter:blur(12px);z-index:100;height:56px;}
  .logo{font-family:'Lora',serif;font-size:18px;color:#F0EDE4;text-decoration:none;}
  .logo span{color:#B8A98A;font-style:italic;}
  .nav-link{text-decoration:none;color:rgba(232,230,223,0.5);font-size:13px;transition:color 0.2s;cursor:pointer;}
  .nav-link:hover{color:#E8E6DF;}
  .page{padding:36px 44px;min-height:calc(100vh - 56px);max-width:960px;margin:0 auto;}
  .mm-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;}
  .mm-title{font-family:'Lora',serif;font-size:30px;font-weight:400;color:#F0EDE4;margin-bottom:6px;letter-spacing:-0.5px;}
  .mm-sub{font-size:13px;color:rgba(232,230,223,0.3);}
  .mm-actions{display:flex;gap:8px;align-items:flex-start;}
  .mm-btn{background:rgba(255,255,255,0.03);border:0.5px solid rgba(255,255,255,0.1);color:rgba(232,230,223,0.5);padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
  .mm-btn:hover{background:rgba(255,255,255,0.06);color:#E8E6DF;}
  .mm-btn.primary{background:rgba(184,169,138,0.08);border-color:rgba(184,169,138,0.2);color:#B8A98A;}
  .mm-btn.primary:hover{background:rgba(184,169,138,0.14);}
  .shift-bar{background:rgba(255,255,255,0.02);border:0.5px solid rgba(255,255,255,0.06);border-radius:12px;padding:18px 28px;display:flex;align-items:center;gap:24px;margin-bottom:20px;}
  .shift-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(232,230,223,0.2);margin-bottom:4px;}
  .shift-old{font-family:'Lora',serif;font-size:14px;color:rgba(232,230,223,0.22);text-decoration:line-through;text-decoration-color:rgba(226,75,74,0.35);flex:1;}
  .shift-arrow{font-size:20px;color:rgba(184,169,138,0.4);flex-shrink:0;}
  .shift-new{font-family:'Lora',serif;font-size:14px;color:rgba(240,237,228,0.85);font-style:italic;flex:1;text-align:right;}
  .map-container{background:rgba(255,255,255,0.015);border:0.5px solid rgba(255,255,255,0.06);border-radius:16px;padding:32px;margin-bottom:20px;min-height:300px;display:flex;align-items:center;justify-content:center;}
  .quote-card{background:rgba(184,169,138,0.04);border:0.5px solid rgba(184,169,138,0.1);border-left:2px solid rgba(184,169,138,0.45);border-radius:0 12px 12px 0;padding:16px 22px;margin-bottom:20px;}
  .quote-text{font-family:'Lora',serif;font-style:italic;font-size:15px;color:rgba(232,230,223,0.65);line-height:1.65;}
  .quote-attr{font-size:11px;color:rgba(184,169,138,0.35);margin-top:8px;}
  .generating{text-align:center;padding:60px 20px;}
  .gen-spinner{display:inline-block;width:32px;height:32px;border:2px solid rgba(255,255,255,0.06);border-top-color:#B8A98A;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .gen-btn{background:rgba(184,169,138,0.1);border:0.5px solid rgba(184,169,138,0.25);color:#B8A98A;padding:12px 28px;border-radius:24px;border:none;cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;transition:all 0.2s;margin-top:12px;}
  .gen-btn:hover{background:rgba(184,169,138,0.18);}
  .gen-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .raw-preview{background:rgba(255,255,255,0.02);border:0.5px solid rgba(255,255,255,0.06);border-radius:12px;padding:20px;font-size:13px;color:rgba(232,230,223,0.5);line-height:1.7;white-space:pre-wrap;max-height:400px;overflow-y:auto;}
  .error-state{text-align:center;padding:60px;color:rgba(232,230,223,0.4);}
  @media(max-width:700px){.page{padding:24px 16px;}.mm-header{flex-direction:column;gap:12px;}.shift-bar{flex-direction:column;gap:12px;}}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">First <span>Principles</span></a>
  <div><a class="nav-link" id="back-link" href="#">← Back to session</a></div>
</nav>
<div class="page">
  <div class="mm-header">
    <div><div class="mm-title" id="page-title">Mind Map</div><div class="mm-sub" id="page-sub">Your thinking, visualized</div></div>
    <div class="mm-actions" id="mm-actions" style="display:none;"><button class="mm-btn" onclick="downloadSVG()">Export SVG</button><button class="mm-btn primary" onclick="window.print()">Share ↗</button></div>
  </div>
  <div id="loading-state"><div class="generating"><div class="gen-spinner"></div><p style="color:rgba(232,230,223,0.4)">Loading mind map...</p></div></div>
  <div id="generate-state" style="display:none;"><div class="generating"><div style="font-size:40px;margin-bottom:16px;opacity:0.6">🗺️</div><p style="color:rgba(232,230,223,0.5);font-size:15px;margin-bottom:8px;">Ready to generate your mind map?</p><p style="color:rgba(232,230,223,0.3);font-size:13px;">Creates a visual summary of your thinking journey.</p><button class="gen-btn" id="gen-btn" onclick="generateMindmap()">Generate mind map →</button></div></div>
  <div id="map-state" style="display:none;">
    <div class="shift-bar"><div style="flex:1"><div class="shift-label">Original belief</div><div class="shift-old" id="shift-old"></div></div><div class="shift-arrow">→</div><div style="flex:1;text-align:right"><div class="shift-label" style="text-align:right">Real question</div><div class="shift-new" id="shift-new"></div></div></div>
    <div class="map-container" id="map-container"></div>
    <div class="quote-card" id="quote-card" style="display:none"><div class="quote-text" id="quote-text"></div><div class="quote-attr">· Key insight from this session</div></div>
  </div>
  <div id="error-state" style="display:none" class="error-state"><p>⚠️ Failed to load.</p><a href="/" class="nav-link" style="color:#B8A98A">Go home →</a></div>
</div>
<script>
const convId=location.pathname.split('/').pop();
document.getElementById('back-link').href='/chat/'+convId;

async function init(){
  const ls=document.getElementById('loading-state'),gs=document.getElementById('generate-state'),ms=document.getElementById('map-state'),es=document.getElementById('error-state');
  if(!convId){ls.style.display='none';es.style.display='block';return;}
  try{
    const r=await fetch('/api/conversations/'+convId);const conv=await r.json();
    document.getElementById('page-title').textContent=conv.title||'Mind Map';
    document.getElementById('page-sub').textContent=`${conv.messages?.length||0} messages`;
    if(conv.mindmap){ls.style.display='none';ms.style.display='block';document.getElementById('mm-actions').style.display='flex';renderMap(conv.mindmap.data,conv);}
    else{ls.style.display='none';gs.style.display='block';}
  }catch(e){ls.style.display='none';es.style.display='block';}
}

async function generateMindmap(){
  const btn=document.getElementById('gen-btn');btn.disabled=true;btn.textContent='⏳ Generating...';
  try{
    const cr=await fetch('/api/conversations/'+convId);const conv=await cr.json();
    const summary=conv.messages.map(m=>m.role+': '+m.content.slice(0,100)).join('\n');
    const r=await fetch('/api/mindmap',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({conversation_id:convId,summary})});
    if(!r.ok)throw new Error();const data=await r.json();
    document.getElementById('generate-state').style.display='none';document.getElementById('map-state').style.display='block';document.getElementById('mm-actions').style.display='flex';
    renderMap(data.mindmap,conv);
  }catch(e){btn.textContent='❌ Failed. Retry?';btn.disabled=false;btn.onclick=generateMindmap;}
}

async function renderMap(code,conv){
  const c=document.getElementById('map-container');
  try{
    const{default:mermaid}=await import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs');
    mermaid.initialize({startOnLoad:false,theme:'dark',themeVariables:{primaryColor:'#1a1a1c',primaryTextColor:'#F0EDE4',lineColor:'rgba(184,169,138,0.3)'}});
    const{svg}=await mermaid.render('mm-'+Date.now(),code);c.innerHTML=svg;
    const el=c.querySelector('svg');if(el){el.style.maxWidth='100%';el.style.height='auto';}
  }catch(e){c.innerHTML='<div class="raw-preview">'+esc(code)+'</div>';}
  if(conv&&conv.messages&&conv.messages.length>=2){
    document.getElementById('shift-old').textContent=(conv.messages[0].content||'').slice(0,80);
    const lastAi=[...conv.messages].reverse().find(m=>m.role==='assistant');
    if(lastAi){const q=lastAi.content.match(/"([^"]{15,})"/g);if(q&&q.length){document.getElementById('shift-new').textContent=q[0].replace(/"/g,'');document.getElementById('quote-text').textContent=q[0].replace(/"/g,'');document.getElementById('quote-card').style.display='block';}}
  }
}

function downloadSVG(){const svg=document.querySelector('#map-container svg');if(!svg)return;const d=new XMLSerializer().serializeToString(svg);const b=new Blob([d],{type:'image/svg+xml'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='first-principles-mindmap.svg';a.click();URL.revokeObjectURL(u);}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
init();
</script>
</body>
</html>
