<!-- User auth modal -->
<div id="authModal" class="auth-modal" style="display: none;">
  <div class="auth-modal-content">
    <button class="auth-modal-close" onclick="closeAuthModal()">&times;</button>
    
    <div class="auth-logo">
      <span class="auth-icon">🧠</span>
      <h2>First Principles</h2>
      <p>Sign in to save your thinking sessions.</p>
    </div>

    <div class="auth-buttons">
      <!-- Google sign-in -->
      <button class="auth-btn google-btn" onclick="signInWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path d="M17.64 9.2c0-.637-.057-1.252-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.715H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.277C4.672 5.146 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-divider">
        <span>or</span>
      </div>

      <!-- Email auth form -->
      <form id="emailAuthForm" onsubmit="handleEmailAuth(event)">
        <input 
          type="email" 
          id="emailInput" 
          placeholder="Email address" 
          required
          class="auth-input"
        >
        <input 
          type="password" 
          id="passwordInput" 
          placeholder="Password" 
          required
          class="auth-input"
        >
        <button type="submit" class="auth-btn email-btn">
          Sign in / Create account
        </button>
      </form>
    </div>

    <div class="auth-footer">
      <p>Your account will be created automatically on first sign-in</p>
      <p class="auth-terms">
        By signing in, you agree to our
        <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>
      </p>
    </div>
  </div>
</div>

<style>
.auth-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(10, 10, 11, 0.95);
  backdrop-filter: blur(12px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.auth-modal-content {
  background: rgba(255, 255, 255, 0.03);
  border: 0.5px solid rgba(255, 255, 255, 0.1);
  border-radius: 24px;
  padding: 48px 40px;
  max-width: 440px;
  width: 90%;
  position: relative;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.auth-modal-close {
  position: absolute;
  top: 20px;
  right: 20px;
  background: none;
  border: none;
  color: rgba(232, 230, 223, 0.5);
  font-size: 28px;
  cursor: pointer;
  transition: color 0.2s;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}

.auth-modal-close:hover {
  color: #E8E6DF;
  background: rgba(255, 255, 255, 0.05);
}

.auth-logo {
  text-align: center;
  margin-bottom: 32px;
}

.auth-icon {
  font-size: 48px;
  display: block;
  margin-bottom: 16px;
}

.auth-logo h2 {
  font-family: 'Lora', serif;
  font-size: 28px;
  color: #F0EDE4;
  margin-bottom: 8px;
}

.auth-logo p {
  font-size: 14px;
  color: rgba(232, 230, 223, 0.5);
}

.auth-buttons {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.auth-btn {
  width: 100%;
  padding: 14px 20px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: all 0.2s;
}

.google-btn {
  background: #fff;
  color: #0A0A0B;
}

.google-btn:hover {
  background: rgba(255, 255, 255, 0.9);
}

.email-btn {
  background: #B8A98A;
  color: #0A0A0B;
}

.email-btn:hover {
  opacity: 0.9;
}

.auth-divider {
  display: flex;
  align-items: center;
  text-align: center;
  margin: 8px 0;
}

.auth-divider::before,
.auth-divider::after {
  content: '';
  flex: 1;
  border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
}

.auth-divider span {
  padding: 0 16px;
  font-size: 12px;
  color: rgba(232, 230, 223, 0.4);
}

.auth-input {
  width: 100%;
  padding: 14px 16px;
  background: rgba(255, 255, 255, 0.04);
  border: 0.5px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  color: #E8E6DF;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  margin-bottom: 12px;
  transition: border-color 0.2s;
}

.auth-input:focus {
  outline: none;
  border-color: rgba(184, 169, 138, 0.5);
}

.auth-input::placeholder {
  color: rgba(232, 230, 223, 0.3);
}

.auth-footer {
  text-align: center;
  margin-top: 24px;
}

.auth-footer p {
  font-size: 12px;
  color: rgba(232, 230, 223, 0.4);
  margin-bottom: 8px;
}

.auth-terms {
  line-height: 1.5;
}

.auth-terms a {
  color: rgba(184, 169, 138, 0.8);
  text-decoration: none;
}

.auth-terms a:hover {
  text-decoration: underline;
}
</style>

<script>
// 打开登录弹窗
function openAuthModal() {
  document.getElementById('authModal').style.display = 'flex';
}

// 关闭登录弹窗
function closeAuthModal() {
  document.getElementById('authModal').style.display = 'none';
}

// 点击外部关闭
window.onclick = function(event) {
  const modal = document.getElementById('authModal');
  if (event.target === modal) {
    closeAuthModal();
  }
}

// 处理邮箱登录/注册
async function handleEmailAuth(event) {
  event.preventDefault();
  
  const email = document.getElementById('emailInput').value;
  const password = document.getElementById('passwordInput').value;
  
  // 先尝试登录
  let result = await signInWithEmail(email, password);
  
  // 如果登录失败，尝试注册
  if (!result.success) {
    result = await signUpWithEmail(email, password);
  }
  
  if (result.success) {
    closeAuthModal();
    // 刷新页面以更新用户状态
    window.location.reload();
  } else {
    alert('Sign-in failed: ' + result.error);
  }
}
</script>
