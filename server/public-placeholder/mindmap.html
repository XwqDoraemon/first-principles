<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mind Map — First Principles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #fafafa; color: #171717; }
    a { color: inherit; text-decoration: none; }

    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #e5e5e5; height: 56px; }
    .nav-inner { max-width: 896px; margin: 0 auto; padding: 0 1.5rem; height: 100%; display: flex; align-items: center; justify-content: space-between; }
    .nav-brand { display: flex; align-items: center; gap: 0.5rem; font-weight: 700; font-size: 1rem; }

    .container { max-width: 960px; margin: 0 auto; padding: 5rem 1.5rem 2rem; }
    .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: #737373; font-size: 0.875rem; margin-bottom: 2rem; transition: color 0.2s; }
    .back-link:hover { color: #0284c7; }
    .title { font-size: 1.5rem; font-weight: 700; margin-bottom: 2rem; }

    .mindmap-container { background: #fff; border: 1px solid #e5e5e5; border-radius: 1rem; padding: 2rem; min-height: 400px; display: flex; align-items: center; justify-content: center; }
    .mindmap-container svg { max-width: 100%; height: auto; }

    .loading { text-align: center; color: #737373; }
    .loading .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #e5e5e5; border-top-color: #0284c7; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error { text-align: center; color: #dc2626; padding: 2rem; }
    .actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .actions button { background: #fff; border: 1px solid #e5e5e5; border-radius: 0.75rem; padding: 0.625rem 1.25rem; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .actions button:hover { border-color: #0284c7; color: #0284c7; }

    .generating { text-align: center; padding: 3rem; }
    .generating button { background: linear-gradient(135deg, #0ea5e9, #2563eb); color: #fff; font-weight: 600; padding: 0.875rem 2rem; border-radius: 9999px; border: none; cursor: pointer; font-size: 1rem; transition: all 0.2s; font-family: inherit; }
    .generating button:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(37,99,235,0.3); }
    .generating button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand"><span style="font-size:1.25rem">🧠</span> First Principles</a>
    </div>
  </nav>

  <div class="container">
    <a href="#" class="back-link" id="back-link">← Back to conversation</a>
    <h1 class="title" id="page-title">Mind Map</h1>

    <div class="mindmap-container" id="mindmap-area">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Loading mind map...</p>
      </div>
    </div>

    <div id="generate-section" style="display:none">
      <div class="generating">
        <p style="margin-bottom:1.5rem;color:#737373">Generate an interactive mind map from your conversation?</p>
        <button id="generate-btn" onclick="generateMindmap()">🗺️ Generate Mind Map</button>
      </div>
    </div>

    <div class="actions" id="download-actions" style="display:none">
      <button onclick="downloadSVG()">📥 Download SVG</button>
      <button onclick="window.print()">🖨️ Print</button>
    </div>
  </div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, theme: 'default', flowchart: { useMaxWidth: true } });

    const convId = window.location.pathname.split('/').pop();
    const backLink = document.getElementById('back-link');
    const mindmapArea = document.getElementById('mindmap-area');
    const loading = document.getElementById('loading');
    const generateSection = document.getElementById('generate-section');
    const downloadActions = document.getElementById('download-actions');

    if (convId) {
      backLink.href = `/chat/${convId}`;

      // Try to load existing mindmap
      try {
        const res = await fetch(`/api/conversations/${convId}`);
        const conv = await res.json();
        document.getElementById('page-title').textContent = (conv.title || 'Mind Map');

        if (conv.mindmap) {
          await renderMindmap(conv.mindmap.data);
        } else {
          loading.style.display = 'none';
          generateSection.style.display = 'block';
        }
      } catch (e) {
        loading.innerHTML = '<div class="error">Failed to load conversation.</div>';
      }
    }

    async function renderMindmap(mermaidCode) {
      loading.style.display = 'none';
      generateSection.style.display = 'none';

      try {
        const { svg } = await mermaid.render('mindmap-graph', mermaidCode);
        mindmapArea.innerHTML = svg;
        mindmapArea.querySelector('svg')?.style && (mindmapArea.querySelector('svg').style.maxWidth = '100%');
        downloadActions.style.display = 'flex';
      } catch (e) {
        mindmapArea.innerHTML = `
          <div style="text-align:center;color:#737373;max-width:480px">
            <p style="margin-bottom:1rem">⚠️ Could not render mind map.</p>
            <pre style="text-align:left;font-size:0.75rem;background:#f5f5f5;padding:1rem;border-radius:0.5rem;overflow:auto;max-height:300px">${escapeHtml(mermaidCode)}</pre>
          </div>
        `;
      }
    }

    async function generateMindmap() {
      const btn = document.getElementById('generate-btn');
      btn.disabled = true;
      btn.textContent = '⏳ Generating...';

      try {
        const convRes = await fetch(`/api/conversations/${convId}`);
        const conv = await convRes.json();
        const summary = conv.messages.map(m => `${m.role}: ${m.content.slice(0, 100)}`).join('\n');

        const res = await fetch('/api/mindmap', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ conversation_id: convId, summary }),
        });

        if (!res.ok) throw new Error('Generate failed');
        const data = await res.json();
        await renderMindmap(data.mindmap);
      } catch (e) {
        btn.textContent = '❌ Failed. Click to retry.';
        btn.disabled = false;
        btn.onclick = generateMindmap;
      }
    }

    function downloadSVG() {
      const svg = mindmapArea.querySelector('svg');
      if (!svg) return;
      const data = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([data], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'mindmap.svg'; a.click();
      URL.revokeObjectURL(url);
    }

    function escapeHtml(str) {
      const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
    }

    window.generateMindmap = generateMindmap;
    window.downloadSVG = downloadSVG;
  </script>
</body>
</html>
