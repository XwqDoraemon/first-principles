<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thinking — First Principles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #fafafa; color: #171717; -webkit-font-smoothing: antialiased; line-height: 1.6; }
    a { color: inherit; text-decoration: none; }

    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #e5e5e5; height: 56px; }
    .nav-inner { max-width: 896px; margin: 0 auto; padding: 0 1.5rem; height: 100%; display: flex; align-items: center; justify-content: space-between; }
    .nav-brand { display: flex; align-items: center; gap: 0.5rem; font-weight: 700; font-size: 1rem; cursor: pointer; }
    .nav-links a { font-size: 0.875rem; font-weight: 500; color: #737373; margin-left: 1.5rem; transition: color 0.2s; }
    .nav-links a:hover { color: #0284c7; }

    .main { display: flex; flex-direction: column; height: 100vh; padding-top: 56px; }
    .messages { flex: 1; overflow-y: auto; padding: 1.5rem; }
    .messages-inner { max-width: 672px; margin: 0 auto; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
    .empty-state p.emoji { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .empty-state p { color: #737373; margin-bottom: 1.5rem; }

    .msg { margin-bottom: 1rem; display: flex; flex-direction: column; }
    .msg-user { align-items: flex-end; }
    .msg-assistant { align-items: flex-start; }
    .msg-bubble { max-width: 85%; padding: 0.75rem 1rem; border-radius: 1rem; font-size: 0.9375rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .msg-user .msg-bubble { background: #f5f5f5; color: #171717; border-bottom-right-radius: 0.25rem; }
    .msg-assistant .msg-bubble { background: linear-gradient(135deg, #f0f9ff, #eff6ff); color: #1e293b; border-bottom-left-radius: 0.25rem; }
    .msg-meta { font-size: 0.75rem; color: #a3a3a3; margin-top: 0.25rem; padding: 0 0.25rem; }
    .msg-assistant .msg-meta { text-align: left; }
    .msg-user .msg-meta { text-align: right; }

    .typing { display: inline-flex; gap: 4px; padding: 0.5rem 0; }
    .typing span { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; animation: blink 1.4s infinite both; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

    .input-bar { border-top: 1px solid #e5e5e5; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); padding: 1rem 1.5rem; }
    .input-inner { max-width: 672px; margin: 0 auto; display: flex; gap: 0.75rem; align-items: flex-end; }
    .input-inner textarea { flex: 1; resize: none; border: 1px solid #d4d4d4; border-radius: 0.75rem; padding: 0.75rem 1rem; font-size: 0.9375rem; font-family: inherit; background: #fff; outline: none; min-height: 44px; max-height: 120px; transition: border-color 0.2s; }
    .input-inner textarea:focus { border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56,189,248,0.15); }
    .input-inner button { background: #171717; color: #fff; font-weight: 600; padding: 0.75rem 1.25rem; border-radius: 0.75rem; border: none; cursor: pointer; font-size: 0.9375rem; white-space: nowrap; transition: background 0.2s; flex-shrink: 0; }
    .input-inner button:hover:not(:disabled) { background: #262626; }
    .input-inner button:disabled { opacity: 0.4; cursor: not-allowed; }

    .mindmap-cta { text-align: center; margin: 1.5rem 0; }
    .mindmap-cta a { display: inline-flex; align-items: center; gap: 0.5rem; background: linear-gradient(135deg, #0ea5e9, #2563eb); color: #fff; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 9999px; transition: all 0.2s; font-size: 0.9375rem; }
    .mindmap-cta a:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(37,99,235,0.3); }

    @media (max-width: 640px) {
      .messages { padding: 1rem; }
      .msg-bubble { max-width: 90%; font-size: 0.875rem; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand"><span style="font-size:1.25rem">🧠</span> First Principles</a>
      <div class="nav-links">
        <a href="/history">History</a>
        <a href="/about">About</a>
      </div>
    </div>
  </nav>

  <div class="main">
    <div class="messages" id="messages">
      <div class="messages-inner" id="messages-inner">
        <div class="empty-state" id="empty-state">
          <p class="emoji">🧠</p>
          <h2>Think from first principles.</h2>
          <p>AI-guided thinking for life's hard questions.</p>
          <p style="color:#a3a3a3;font-size:0.875rem">Type your question below to begin.</p>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-inner">
        <textarea id="user-input" placeholder="What's on your mind?" rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()">Send →</button>
      </div>
    </div>
  </div>

  <script>
    const messagesInner = document.getElementById('messages-inner');
    const emptyState = document.getElementById('empty-state');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const messagesEl = document.getElementById('messages');

    let conversationId = null;
    let chatMessages = []; // { role, content }
    let isStreaming = false;

    // Auto-resize textarea
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    });
    userInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // Check for first message from localStorage
    const firstMsg = localStorage.getItem('fp-first-msg');
    if (firstMsg) {
      localStorage.removeItem('fp-first-msg');
      setTimeout(() => { userInput.value = firstMsg; sendMessage(); }, 300);
    }

    // Load existing conversation
    const pathId = window.location.pathname.split('/').pop();
    if (pathId && pathId !== 'new') {
      loadConversation(pathId);
    }

    async function loadConversation(id) {
      try {
        const res = await fetch(`/api/conversations/${id}`);
        if (!res.ok) return;
        const conv = await res.json();
        conversationId = conv.id;
        chatMessages = conv.messages.map(m => ({ role: m.role, content: m.content }));
        if (conv.title) document.title = conv.title + ' — First Principles';
        renderAll();
        if (conv.mindmap) showMindmapCta(id);
      } catch (e) { console.error('Load error:', e); }
    }

    function renderAll() {
      emptyState.style.display = 'none';
      // Clear existing messages (keep mindmap CTA if exists)
      const existing = messagesInner.querySelectorAll('.msg');
      existing.forEach(el => el.remove());
      chatMessages.forEach(m => appendMessageDOM(m.role, m.content));
      scrollToBottom();
    }

    function appendMessageDOM(role, content) {
      emptyState.style.display = 'none';
      const div = document.createElement('div');
      div.className = `msg msg-${role}`;
      const now = new Date();
      const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      div.innerHTML = `
        <div class="msg-bubble">${escapeHtml(content)}</div>
        <div class="msg-meta">${role === 'user' ? 'You' : 'First Principles'} · ${time}</div>
      `;
      messagesInner.appendChild(div);
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'msg msg-assistant';
      div.id = 'typing-indicator';
      div.innerHTML = '<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
      messagesInner.appendChild(div);
      scrollToBottom();
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function showMindmapCta(convId) {
      // Remove existing CTA if any
      const existing = document.getElementById('mindmap-cta');
      if (existing) existing.remove();
      const div = document.createElement('div');
      div.className = 'mindmap-cta';
      div.id = 'mindmap-cta';
      div.innerHTML = `<a href="/mindmap/${convId}">🎉 Great thinking! View your mind map →</a>`;
      messagesInner.appendChild(div);
      scrollToBottom();
    }

    async function sendMessage() {
      const content = userInput.value.trim();
      if (!content || isStreaming) return;

      isStreaming = true;
      sendBtn.disabled = true;
      sendBtn.textContent = 'Thinking…';
      userInput.value = '';
      userInput.style.height = 'auto';

      // Add user message
      chatMessages.push({ role: 'user', content });
      appendMessageDOM('user', content);
      scrollToBottom();

      // Show typing
      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: chatMessages, conversationId }),
        });

        if (!res.ok) throw new Error('API error');
        removeTyping();

        // Read SSE stream
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let assistantContent = '';
        let buffer = '';

        // Create assistant message bubble
        const msgDiv = appendMessageDOM('assistant', '');
        const bubble = msgDiv.querySelector('.msg-bubble');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]') continue;

            try {
              const parsed = JSON.parse(data);
              if (parsed.error) {
                bubble.textContent = '⚠️ ' + parsed.error;
                break;
              }
              if (parsed.conversationId) {
                conversationId = parsed.conversationId;
                history.replaceState(null, '', `/chat/${conversationId}`);
              }
              if (parsed.content) {
                assistantContent += parsed.content;
                bubble.textContent = assistantContent;
                scrollToBottom();
              }
            } catch {}
          }
        }

        chatMessages.push({ role: 'assistant', content: assistantContent });

        // Check if conversation seems complete (stage 5 summary)
        const isComplete = assistantContent.includes('总结') || assistantContent.includes('summary') || assistantContent.includes('mind map') || assistantContent.includes('思维导图');
        if (isComplete && conversationId) {
          showMindmapCta(conversationId);
        }

      } catch (err) {
        removeTyping();
        appendMessageDOM('assistant', '⚠️ Connection error. Please try again.');
        console.error('Chat error:', err);
      } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send →';
        userInput.focus();
      }
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
