# Cloudflare Pages 配置文件
# 纯前端部署：静态文件 + Supabase 后端

# 构建配置
[build]
  # 发布目录（静态文件）
  publish = "server/public-placeholder"
  
  # 无需构建命令（纯静态文件）
  command = ""

# 环境变量（可选）
[build.environment]
  NODE_VERSION = "18"

# 重定向规则（SPA 路由支持）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  
# 特定页面路由
[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/chat"
  to = "/chat.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/history"
  to = "/history.html"
  status = 200

# API 代理到 Supabase（可选）
[[routes]]
  pattern = "/api/*"
  custom_headers = { "X-Forwarded-Host" = "your-domain.pages.dev" }

# 头部配置
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 缓存策略
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
